:root{--paper:#F4EFE3;--paper-2:#EBE3D2;--card:#FBF8F0;--ink:#221F18;--ink-soft:#524D41;--ink-faint:#928a78;--line:#DBD1BD;--seal:#9B3322;--celadon:#6f8a66;--gold:#a87f3e;--blue:#4A6C8C;--r:14px;--shadow:0 1px 2px rgba(34,31,24,.06),0 8px 24px rgba(34,31,24,.05);}
*{box-sizing:border-box}
body{margin:0}
.root,.auth-wrap,.splash-wrap,.splash{font-family:'Spectral',Georgia,serif;color:var(--ink);background:radial-gradient(120% 80% at 0% 0%,#F8F4EA 0%,var(--paper) 55%,var(--paper-2) 100%);min-height:100vh;-webkit-font-smoothing:antialiased}
.root{display:flex}
button{font-family:inherit;cursor:pointer}
h1,h2,h3{font-family:'Fraunces',serif;font-weight:500;margin:0;letter-spacing:-.01em}
.muted{color:var(--ink-faint)}.small{font-size:12px}.muted-icon{color:var(--ink-faint)}
.splash{display:grid;place-items:center;font-size:17px;color:var(--ink-faint)}
.sidebar{width:228px;flex-shrink:0;padding:24px 16px;border-right:1px solid var(--line);display:flex;flex-direction:column;gap:8px;position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:12px;padding:4px 8px 18px}
.seal{display:grid;place-items:center;width:40px;height:40px;border-radius:10px;background:var(--seal);color:#F4EFE3;font-family:'Fraunces',serif;font-size:22px;box-shadow:inset 0 0 0 2px rgba(255,255,255,.12)}
.seal.big{width:60px;height:60px;font-size:32px;border-radius:14px;margin:0 auto 6px}
.brand-title{font-family:'Fraunces',serif;font-size:19px;line-height:1}
.brand-sub{font-size:11px;color:var(--ink-faint);letter-spacing:.14em;text-transform:uppercase;margin-top:3px}
.side-nav{display:flex;flex-direction:column;gap:2px;flex:1}
.side-link{display:flex;align-items:center;gap:11px;padding:10px 12px;border:none;background:none;border-radius:10px;color:var(--ink-soft);font-size:15px;text-align:left;transition:.15s}
.side-link:hover{background:rgba(155,51,34,.06);color:var(--ink)}
.side-link.active{background:var(--ink);color:var(--paper)}
.side-foot{display:flex;align-items:center;gap:8px}
.side-out{display:grid;place-items:center;width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--ink-faint)}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:none}
.canvas{padding:34px 40px 80px;max-width:1100px;width:100%}
.canvas.wide{max-width:1600px}
.sync-pill{display:inline-flex;align-items:center;gap:7px;padding:7px 12px;border-radius:20px;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);font-size:12px;font-family:'Spectral',serif;flex:1;justify-content:center}
.sync-pill:hover{border-color:var(--seal);color:var(--seal)}
.sync-pill.compact{padding:7px;border-radius:50%;flex:none}

.sec-head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:22px}

.sec-sub{color:var(--ink-faint);font-size:14px;margin:5px 0 0;max-width:46ch}
.btn{display:inline-flex;align-items:center;gap:7px;border-radius:10px;padding:9px 15px;font-size:14px;border:1px solid var(--line);background:var(--card);color:var(--ink);transition:.15s;white-space:nowrap}
.btn:hover{border-color:var(--ink-faint)}

.btn.primary:hover{background:#86281a}
.btn.primary:disabled{opacity:.45;cursor:not-allowed}

.icon-btn{display:grid;place-items:center;width:34px;height:34px;border-radius:9px;border:1px solid transparent;background:none;color:var(--ink-faint)}
.icon-btn:hover{background:rgba(34,31,24,.05);color:var(--ink)}
.icon-btn.danger:hover{color:var(--seal);background:rgba(155,51,34,.08)}
.text-link{border:none;background:none;color:var(--seal);font-family:inherit;font-size:inherit;text-decoration:underline;text-underline-offset:3px;padding:0}
.text-link.center{display:block;margin:14px auto 0;text-align:center}
.tag{font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;padding:3px 7px;border-radius:6px;background:var(--paper-2);color:var(--ink-soft);font-family:'Spectral',serif;font-weight:500}
.tag.t-seal,.tag.t-quarter{background:rgba(155,51,34,.12);color:var(--seal)}
.tag.t-week{background:rgba(74,108,140,.12);color:var(--blue)}
.tag.t-day{background:rgba(111,138,102,.16);color:var(--celadon)}
.tag.t-decision{background:rgba(168,127,62,.16);color:var(--gold)}
.tag.t-mood{background:var(--paper-2);color:var(--ink-soft)}
.tag.t-cat{background:rgba(74,108,140,.13);color:var(--blue)}
.status-btn{display:grid;place-items:center;width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:var(--card);flex-shrink:0;color:var(--ink-faint);transition:.15s}
.status-btn.s-doing{color:var(--gold);border-color:var(--gold)}
.status-btn.s-done{color:#fff;background:var(--celadon);border-color:var(--celadon)}
.dash-hero{margin-bottom:26px}
.dash-date{color:var(--ink-faint);font-size:14px;letter-spacing:.04em;margin:0 0 4px}
.dash-hero h1{font-size:38px}
.dash-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px 22px;box-shadow:var(--shadow)}
.card .sec-head{margin-bottom:14px}.card .sec-head h2{font-size:17px}
.span-2{grid-column:span 2}
.mini-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px}
.mini-list li{display:flex;align-items:center;gap:10px;font-size:15px}
.mini-list li.done .mini-title{color:var(--ink-faint);text-decoration:line-through}
.mini-title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.goal-row .dot,.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;background:var(--seal)}
.empty-card{color:var(--ink-faint);font-size:14px;padding:6px 0;line-height:1.6}
.group{margin-bottom:26px}
.group-head{display:flex;align-items:center;gap:9px;font-family:'Fraunces',serif;font-size:15px;color:var(--ink-soft);margin-bottom:10px;padding-left:2px}
.list{display:flex;flex-direction:column;gap:8px}
.row{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow)}
.row-main{flex:1;min-width:0;cursor:pointer}
.row-title{font-size:15.5px;display:flex;align-items:center;gap:8px}
.row-title.struck{color:var(--ink-faint);text-decoration:line-through}
.row-sub{font-size:12.5px;color:var(--ink-faint);margin-top:3px;display:flex;align-items:center;gap:5px}
.row-actions{display:flex;gap:6px;align-items:center;margin-top:12px}
.q-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
.q-card{background:var(--card);border:1px solid var(--line);border-top:3px solid var(--seal);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow)}
.q-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.q-dates{font-size:12px;color:var(--ink-faint)}
.q-title{font-size:19px;line-height:1.25}
.q-desc{font-size:13.5px;color:var(--ink-soft);margin:8px 0 14px;line-height:1.5}
.progress{height:6px;background:var(--paper-2);border-radius:4px;overflow:hidden;margin-top:12px}
.progress-fill{height:100%;border-radius:4px;transition:width .4s}
.q-meta{margin-top:8px}
.date-strip{display:flex;align-items:center;justify-content:space-between;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 12px;margin-bottom:18px;box-shadow:var(--shadow)}
.date-strip-label{text-align:center;font-size:16px;display:flex;flex-direction:column;gap:2px}
.date-strip-label .text-link{font-size:12px}
.gantt-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r);background:var(--card);box-shadow:var(--shadow)}
.gantt{min-width:760px;padding:14px 18px 18px}
.gantt-axis{position:relative;height:20px;margin-left:280px;border-bottom:1px dashed var(--line);margin-bottom:10px}
.gantt-tick{position:absolute;transform:translateX(-50%);font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.08em}
.gantt-body{position:relative}
.gantt-today{position:absolute;top:-4px;bottom:0;width:0;border-left:2px dotted var(--seal);z-index:3}
.gantt-today span{position:absolute;top:-2px;left:4px;font-size:10px;color:var(--seal);text-transform:uppercase;letter-spacing:.1em}
.gantt-row{display:flex;align-items:center;min-height:38px;padding:3px 0}
.gantt-row.indent .gantt-label{padding-left:16px;color:var(--ink-soft);font-size:13px}
.gantt-label{width:280px;flex-shrink:0;font-size:13.5px;line-height:1.3;padding-right:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.gantt-track{position:relative;flex:1;height:24px}
.gantt-bar{position:absolute;top:50%;transform:translateY(-50%);height:18px;border-radius:9px;display:flex;align-items:center;padding:0 8px;min-width:6px;opacity:.92}
.gantt-bar.k-quarter{height:22px;border-radius:11px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.25)}
.gantt-bar.done{opacity:.45}
.gantt-bar-date{font-size:10px;color:#fff;white-space:nowrap;overflow:hidden;pointer-events:none;flex:1;text-align:center}
.gantt-bar.draggable{cursor:grab;touch-action:none;user-select:none}
.gantt-bar.draggable:active{cursor:grabbing}
.gantt-handle{position:absolute;top:0;bottom:0;width:14px;cursor:ew-resize;touch-action:none;display:flex;align-items:center;justify-content:center}
.gantt-handle.left{left:-3px}
.gantt-handle.right{right:-3px}
.gantt-handle::after{content:"";width:3px;height:60%;border-radius:2px;background:rgba(255,255,255,.7)}
.gantt-bar.k-day .gantt-handle{display:none}
.gantt-hint{position:sticky;left:50%;transform:translateX(-50%);display:inline-block;margin:10px auto 0;background:var(--ink);color:var(--paper);font-size:12px;padding:5px 11px;border-radius:7px;font-family:'Spectral',serif}
.ledger{display:flex;flex-direction:column;gap:2px;border-left:2px solid var(--line);margin-left:8px}
.ledger-item{display:flex;gap:16px;padding:14px 14px 14px 22px;position:relative;cursor:pointer;border-radius:0 10px 10px 0;transition:.15s}
.ledger-item:hover{background:rgba(168,127,62,.07)}
.ledger-item::before{content:'';position:absolute;left:-7px;top:20px;width:10px;height:10px;border-radius:50%;background:var(--gold);border:2px solid var(--paper)}
.ledger-date{font-size:12px;color:var(--ink-faint);width:54px;flex-shrink:0;padding-top:2px;text-transform:uppercase;letter-spacing:.06em}
.ledger-main{flex:1;min-width:0}
.ledger-title{font-family:'Fraunces',serif;font-size:17px}
.ledger-choice{font-size:14px;margin-top:4px}
.ledger-rationale{font-size:13.5px;color:var(--ink-soft);margin:6px 0 0;line-height:1.55}
.reflections{columns:2;column-gap:18px}
.refl-card{break-inside:avoid;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin-bottom:18px;box-shadow:var(--shadow);position:relative;cursor:pointer;transition:.15s}
.refl-card:hover{border-color:var(--ink-faint)}
.refl-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.refl-date{font-size:12px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.06em}
.refl-title{font-family:'Fraunces',serif;font-size:17px;margin-bottom:6px}
.refl-body{font-size:14.5px;line-height:1.6;color:var(--ink-soft);white-space:pre-wrap;margin:0}
.refl-filter{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.chip-filter{display:inline-flex;align-items:center;gap:7px;padding:6px 13px;border-radius:20px;border:1px solid var(--line);background:var(--card);font-family:'Spectral',serif;font-size:13.5px;color:var(--ink-soft)}
.chip-filter:hover{border-color:var(--ink-faint)}
.chip-filter.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.cf-count{font-size:11px;opacity:.7}
.cat-grid{display:flex;flex-wrap:wrap;gap:8px}
.cat-chip{padding:8px 13px;border-radius:9px;border:1px solid var(--line);background:var(--card);font-family:'Spectral',serif;font-size:13.5px;color:var(--ink-soft)}
.cat-chip:hover{border-color:var(--ink-faint)}
.cat-chip.on{background:var(--seal);color:var(--paper);border-color:var(--seal)}
.refl-del{position:absolute;top:12px;right:10px;opacity:0;transition:.15s}
.refl-card:hover .refl-del{opacity:1}
.link-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.link-badge{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;color:var(--ink-soft);background:var(--paper-2);border-radius:6px;padding:3px 8px}
.modal-scrim{position:fixed;inset:0;background:rgba(34,31,24,.42);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:18px;z-index:50}
.modal{background:var(--paper);border:1px solid var(--line);border-radius:18px;width:100%;max-width:480px;max-height:90vh;overflow:auto;box-shadow:0 24px 60px rgba(34,31,24,.28)}
.modal.wide{max-width:600px}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:20px 22px 0}
.modal-head h3{font-size:21px}
.modal-body{padding:18px 22px 22px}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.form{display:flex;flex-direction:column;gap:15px}
.field{display:flex;flex-direction:column;gap:6px}
.field>span{font-size:12px;text-transform:uppercase;letter-spacing:.09em;color:var(--ink-faint)}
.field input,.field textarea,.field select{font-family:'Spectral',serif;font-size:15px;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:9px;padding:10px 12px;width:100%;resize:vertical}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--seal)}
.field-row{display:flex;gap:12px}.field-row .field{flex:1}.field.grow{flex:2}
.field.checkbox{flex-direction:row;align-items:center;gap:9px}
.field.checkbox input{width:auto}.field.checkbox span{text-transform:none;letter-spacing:0;font-size:14px;color:var(--ink)}
.swatches{display:flex;gap:8px}
.swatch{width:28px;height:28px;border-radius:50%;border:2px solid transparent}
.swatch.on{box-shadow:0 0 0 2px var(--paper),0 0 0 4px var(--ink)}
.mood-row,.linkpicker{display:flex;flex-wrap:wrap;gap:8px}
.mood-chip{padding:7px 13px;border-radius:20px;border:1px solid var(--line);background:var(--card);font-family:'Spectral',serif;font-size:13.5px;color:var(--ink-soft)}
.mood-chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.linkpicker{max-height:200px;overflow:auto}
.link-chip{display:inline-flex;align-items:center;gap:7px;padding:6px 10px;border-radius:9px;border:1px solid var(--line);background:var(--card);font-family:'Spectral',serif;font-size:13px;color:var(--ink-soft)}
.link-chip.on{border-color:var(--seal);background:rgba(155,51,34,.07);color:var(--ink)}
.link-chip-label{max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{padding:60px 0;text-align:center;color:var(--ink-faint);font-size:15px}
.auth-wrap{display:grid;place-items:center;padding:24px}
.auth-card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:34px 30px;width:100%;max-width:380px;box-shadow:var(--shadow);text-align:center}
.auth-card .seal{margin:0 auto 14px}
.auth-title{font-size:28px}
.auth-sub{color:var(--ink-faint);font-size:14px;margin:4px 0 22px}
.auth-card .form{text-align:left}
.auth-err{color:var(--seal);font-size:13px;margin:12px 0 0;text-align:left}
.auth-msg{color:var(--celadon);font-size:13px;margin:12px 0 0;text-align:left}
.splash-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;max-width:560px;margin:0 auto}
.splash-wrap h1{font-size:30px;margin-bottom:8px}
.splash-lead{color:var(--ink-soft);font-size:15px;line-height:1.6;margin:0 0 22px;max-width:44ch}
.setup-list{text-align:left;font-size:14.5px;line-height:1.7;color:var(--ink-soft);max-width:46ch}
.setup-list code{background:var(--paper-2);padding:1px 6px;border-radius:5px;font-size:13px}
.setup-card{max-width:420px}
.setup-card .auth-sub{margin-bottom:20px}
.setup-foot{font-size:12.5px;color:var(--ink-faint);line-height:1.6;margin:16px 0 0;text-align:left}
/* calendar */
.cal-toolbar{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.cal-month{font-family:'Fraunces',serif;font-size:20px;min-width:150px;text-align:center}
.cal-today{margin-left:auto}
.cal-quarters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.cal-qchip{display:inline-flex;align-items:center;gap:7px;padding:6px 11px;border-radius:20px;border:1px solid var(--line);background:var(--card);font-family:'Spectral',serif;font-size:13px}
.cal-qrange{font-size:11px;opacity:.7}
.cal-grid{border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:var(--card);box-shadow:var(--shadow)}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:var(--paper-2)}
.cal-dow span{padding:8px 6px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint);text-align:center}
.cal-week{border-top:1px solid var(--line)}
.cal-bars{display:flex;flex-direction:column;gap:2px;padding:3px 3px 0}
.cal-bar-lane{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-bar{grid-row:1;border:none;border-radius:5px;padding:2px 7px;font-size:11px;color:#fff;font-family:'Spectral',serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left;opacity:.92;min-width:0;cursor:pointer}
.cal-bar.done{opacity:.5;text-decoration:line-through}
.cal-bar-more{font-size:10px;color:var(--ink-faint);padding:0 4px}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-cell{min-height:104px;border-right:1px solid var(--line);padding:5px 6px 7px;cursor:pointer;display:flex;flex-direction:column;gap:3px;transition:background .12s}
.cal-cell:last-child{border-right:none}
.cal-cell:hover{background:rgba(155,51,34,.04)}
.cal-cell.other{background:rgba(0,0,0,.015)}
.cal-cell.other .cal-num{color:var(--ink-faint);opacity:.5}
.cal-cell.today .cal-num{background:var(--seal);color:#fff;border-radius:50%;width:22px;height:22px;display:grid;place-items:center}
.cal-num{font-size:13px;color:var(--ink-soft);font-weight:500}
.cal-chips{display:flex;flex-direction:column;gap:2px;min-width:0}
.cal-chip{display:flex;align-items:center;gap:4px;border:none;background:var(--paper-2);border-radius:5px;padding:3px 6px;font-size:11.5px;font-family:'Spectral',serif;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left;min-width:0;cursor:pointer}
.cal-chip-dot{width:6px;height:6px;border-radius:50%;background:var(--ink-faint);flex-shrink:0}
.cal-chip.s-doing .cal-chip-dot{background:var(--gold)}
.cal-chip.s-done{color:var(--ink-faint);text-decoration:line-through}
.cal-chip.s-done .cal-chip-dot{background:var(--celadon)}
.cal-chip-more{font-size:10px;color:var(--ink-faint);padding-left:5px}
.add-choices{display:flex;flex-direction:column;gap:10px}
.add-choice{display:flex;align-items:center;gap:13px;padding:14px 16px;border:1px solid var(--line);border-radius:12px;background:var(--card);text-align:left;color:var(--ink);transition:.15s}
.add-choice:hover{border-color:var(--seal);background:rgba(155,51,34,.04)}
.add-choice div{display:flex;flex-direction:column}
.add-choice strong{font-size:15px;font-weight:500}
.add-choice span{font-size:12.5px;color:var(--ink-faint)}
.danger-text{color:var(--seal)}
/* segmented month/week toggle */
.seg{display:inline-flex;background:var(--paper-2);border-radius:9px;padding:3px;gap:2px}
.seg-btn{border:none;background:none;padding:6px 13px;border-radius:7px;font-family:'Spectral',serif;font-size:13.5px;color:var(--ink-soft)}
.seg-btn.on{background:var(--card);color:var(--ink);box-shadow:0 1px 2px rgba(34,31,24,.12)}
/* drop highlight */
.cal-cell.drop,.wk-day.drop{background:rgba(155,51,34,.1);box-shadow:inset 0 0 0 2px var(--seal)}
.cal-chip-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.cal-chip{touch-action:none}
/* drag ghost */
.drag-ghost{position:fixed;z-index:200;pointer-events:none;transform:translate(8px,8px);background:var(--seal);color:#fff;font-family:'Spectral',serif;font-size:12px;padding:5px 10px;border-radius:7px;box-shadow:0 8px 20px rgba(34,31,24,.3);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* status dot */
.sd{width:9px;height:9px;border-radius:50%;flex-shrink:0;background:var(--ink-faint)}
.sd.s-doing{background:var(--gold)}
.sd.s-done{background:var(--celadon)}
/* week view */
.wk-weeklies{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
.wk-weekly{display:flex;align-items:center;gap:9px;border:1px solid var(--line);border-left:4px solid var(--ink-faint);border-radius:10px;background:var(--card);padding:10px 13px;font-family:'Spectral',serif;font-size:14.5px;color:var(--ink);box-shadow:var(--shadow);text-align:left}
.wk-weekly.done{color:var(--ink-faint);text-decoration:line-through}
.wk-weekly-range{margin-left:auto;font-size:12px;color:var(--ink-faint)}
.wk-days{display:flex;flex-direction:column;gap:8px}
.wk-day{border:1px solid var(--line);border-radius:12px;background:var(--card);box-shadow:var(--shadow);overflow:hidden}
.wk-day.today{border-color:var(--seal)}
.wk-day-head{display:flex;align-items:center;gap:10px;padding:9px 13px;background:var(--paper-2)}
.wk-day-name{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint)}
.wk-day-num{font-family:'Fraunces',serif;font-size:17px}
.wk-day-num.today{background:var(--seal);color:#fff;border-radius:50%;width:26px;height:26px;display:grid;place-items:center;font-size:14px}
.wk-add{margin-left:auto;display:grid;place-items:center;width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--ink-faint)}
.wk-add:hover{color:var(--seal);border-color:var(--seal)}
.wk-tasks{display:flex;flex-direction:column;gap:6px;padding:10px 13px}
.wk-task{display:flex;align-items:center;gap:9px;border:1px solid var(--line);border-radius:9px;background:var(--card);padding:8px 11px;font-family:'Spectral',serif;font-size:14.5px;color:var(--ink);text-align:left;touch-action:none}
.wk-task.s-done{color:var(--ink-faint);text-decoration:line-through}
.wk-status{display:grid;place-items:center;width:26px;height:26px;border-radius:50%;border:1px solid var(--line);flex-shrink:0;color:var(--ink-faint)}
.wk-task.s-doing .wk-status{color:var(--gold);border-color:var(--gold)}
.wk-task.s-done .wk-status{color:#fff;background:var(--celadon);border-color:var(--celadon)}
.wk-empty{color:var(--ink-faint);font-size:13px;cursor:pointer;padding:2px}
/* projects */
.pj-list{display:flex;flex-direction:column;gap:18px}
.pj-card{background:var(--card);border:1px solid var(--line);border-top:3px solid var(--seal);border-radius:var(--r);padding:16px 20px;box-shadow:var(--shadow)}
.pj-head{display:flex;align-items:center;gap:11px}
.pj-toggle{border:none;background:none;color:var(--ink-faint);display:grid;place-items:center;padding:2px}
.pj-head-main{flex:1;min-width:0}
.pj-title{font-size:19px}
.pj-meta{font-size:12.5px;color:var(--ink-faint);margin-top:2px}
.pj-desc{font-size:13.5px;color:var(--ink-soft);margin:10px 0 0;line-height:1.5}
.pj-card .progress{margin-top:12px}
.pj-tree{margin-top:14px;border-top:1px solid var(--line);padding-top:10px;display:flex;flex-direction:column;gap:2px}
.pj-empty{font-size:13px;color:var(--ink-faint);padding:4px 0}
.pj-row{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:8px;cursor:pointer}
.pj-row:hover{background:rgba(155,51,34,.05)}
.pj-row.d0{margin-left:0}.pj-row.d1{margin-left:22px}.pj-row.d2{margin-left:44px}
.pj-row-title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14.5px}
.pj-row-title.struck{color:var(--ink-faint);text-decoration:line-through}
.pj-add{display:inline-flex;align-items:center;gap:6px;align-self:flex-start;margin-top:6px;border:1px dashed var(--line);background:none;border-radius:8px;padding:6px 11px;font-family:'Spectral',serif;font-size:13px;color:var(--ink-soft)}
.pj-add:hover{border-color:var(--seal);color:var(--seal)}
/* projects drill-down */
.open-card{cursor:pointer;transition:.15s}
.open-card:hover{border-color:var(--ink-faint);transform:translateY(-1px)}
.pj-open-chev{color:var(--ink-faint);flex-shrink:0}
.crumbs{display:flex;flex-wrap:wrap;align-items:center;gap:3px;margin-bottom:16px;font-size:13.5px}
.crumb{display:inline-flex;align-items:center;gap:3px}
.crumb-link{border:none;background:none;color:var(--seal);font-family:'Spectral',serif;font-size:13.5px;padding:2px 4px;border-radius:6px}
.crumb-link:hover{background:rgba(155,51,34,.08)}
.crumb-current{color:var(--ink-soft);padding:2px 4px}
.crumb-sep{color:var(--ink-faint)}
.detail-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:6px}
.detail-head-main{flex:1;min-width:0}
.detail-title{font-size:25px;line-height:1.15}
.detail-sub{font-size:13.5px;color:var(--ink-faint);margin-top:4px}
.detail-explain{margin:0 0 18px}
.detail-list{display:flex;flex-direction:column;gap:8px}
.pj-child{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow);cursor:pointer;transition:.13s}
.pj-child:hover{border-color:var(--ink-faint)}
.pj-child-status{display:grid;place-items:center;width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:var(--card);flex-shrink:0;color:var(--ink-faint)}
.pj-child-status:hover{border-color:var(--seal)}
.pj-child-main{flex:1;min-width:0}
.pj-child-title{font-size:15.5px}
.pj-child-title.struck{color:var(--ink-faint);text-decoration:line-through}
.pj-child-sub{font-size:12.5px;color:var(--ink-faint);margin-top:2px}
.pj-child-edit{border:none;background:none;color:var(--ink-faint);display:grid;place-items:center;width:30px;height:30px;border-radius:8px;flex-shrink:0}
.pj-child-edit:hover{background:rgba(34,31,24,.05);color:var(--ink)}
.pj-child-chev{color:var(--ink-faint);flex-shrink:0}
.detail-add-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
/* gantt additions */
.gantt-toggle{flex-direction:row;align-items:center;gap:7px}
.gantt-toggle span{text-transform:none;letter-spacing:0;font-size:13px;color:var(--ink-soft)}
.gantt-grouphead{font-family:'Fraunces',serif;font-size:13px;color:var(--ink-faint);padding:8px 0 4px;text-transform:uppercase;letter-spacing:.08em}
.gantt-row.lvl0 .gantt-label{font-weight:500}
.gantt-row.lvl1 .gantt-label{padding-left:14px;font-size:13px}
.gantt-row.lvl2 .gantt-label{padding-left:28px;font-size:12.5px;color:var(--ink-soft)}
.gantt-row.lvl3 .gantt-label{padding-left:42px;font-size:12px;color:var(--ink-faint)}
.gantt-bar.k-project{height:22px;border-radius:11px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.3)}
.gantt-bar.k-day{height:13px;border-radius:4px;min-width:13px}
.gantt-nodate{font-size:11px;color:var(--ink-faint);font-style:italic}
.botnav{display:none}
@media(max-width:860px){
.root{display:block;padding-bottom:74px}
.sidebar{display:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(244,239,227,.9);backdrop-filter:blur(8px);z-index:20}
.topbar-title{font-family:'Fraunces',serif;font-size:20px}
.topbar-right{display:flex;align-items:center;gap:8px}
.canvas{padding:22px 18px 40px}
.dash-grid{grid-template-columns:1fr}.span-2{grid-column:span 1}
.dash-hero h1{font-size:30px}.sec-head h2{font-size:23px}
.reflections{columns:1}
.cal-cell{min-height:58px;padding:3px 3px 5px}
.cal-num{font-size:11px}
.cal-chip,.cal-bar{font-size:9.5px;padding:1px 4px}
.cal-dow span{font-size:9px;padding:6px 2px}
.cal-month{font-size:17px;min-width:120px}
.botnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:rgba(251,248,240,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:6px 4px;z-index:40;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.botnav::-webkit-scrollbar{display:none}
.bot-link{flex:0 0 auto;min-width:62px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;padding:6px 2px;color:var(--ink-faint);font-size:10px;font-family:'Spectral',serif}
.bot-link.active{color:var(--seal)}
.sec-head{flex-wrap:wrap}
}
@media(max-width:420px){.bot-link span{font-size:9px}.field-row{flex-direction:column}}
